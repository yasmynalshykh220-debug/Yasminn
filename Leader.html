
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ليدر الدفعة</title>
<style>
body{
    text-align:center; 
    padding:30px; 
    background:#e3f2fd; 
    font-family:sans-serif;
}
h2{
    color:#1565c0;
    background:white;
    padding:15px;
    border-radius:10px;
}
.card{
    background:white;
    margin:20px;
    padding:20px;
    border-radius:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
button{
    background:#1976d2;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    font-size:16px;
    margin:10px;
}
</style>
</head>
<body>

<h2>⭐ شاشة ليدر الدفعة</h2>

<div class="card">
    <h3>📢 الإعلانات</h3>
    <p>هنا بتكتبي الإعلانات للدفعة</p>
    <button>إضافة إعلان</button>
</div>

<div class="card">
    <h3>👥 أعضاء الدفعة</h3>
    <p>عدد الطلاب: 0</p>
    <button>عرض الأعضاء</button>
</div>

<div class="card">
    <h3>📅 الجدول</h3>
    <p>جدول المحاضرات والامتحانات</p>
    <button>تعديل الجدول</button>
</div>

</body></html>
